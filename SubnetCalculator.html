<!DOCTYPE html>
<html lang="it" data-theme="light" data-lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Calculator — Purple Utilities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"] {
    --bg: #f5f4f8;
    --bg2: #edeaf5;
    --surface: #ffffff;
    --surface2: #f0edf9;
    --border: #d9d2f0;
    --text: #1a1626;
    --text2: #5a5272;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --accent-bg: #ede9fe;
    --valid: #059669;
    --valid-bg: #d1fae5;
    --error: #dc2626;
    --error-bg: #fee2e2;
    --tag-bg: #ede9fe;
    --tag-text: #6d28d9;
    --mono-bg: #f3f0ff;
    --shadow: 0 2px 16px rgba(124,58,237,0.08);
    --shadow-lg: 0 8px 40px rgba(124,58,237,0.13);
  }
  :root[data-theme="dark"] {
    --bg: #0f0d17;
    --bg2: #16132a;
    --surface: #1e1a31;
    --surface2: #261f40;
    --border: #312855;
    --text: #f0ecff;
    --text2: #9d8fc4;
    --accent: #a78bfa;
    --accent2: #c4b5fd;
    --accent-bg: #2e1f5e;
    --valid: #34d399;
    --valid-bg: #064e3b;
    --error: #f87171;
    --error-bg: #450a0a;
    --tag-bg: #2e1f5e;
    --tag-text: #c4b5fd;
    --mono-bg: #1a1530;
    --shadow: 0 2px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    font-size: 15px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent2); border-radius: 50%; }
  .header-controls { display: flex; align-items: center; gap: 10px; }

  .btn-icon {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-icon:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent2); }
  .btn-icon.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* Main */
  .main { max-width: 780px; margin: 0 auto; padding: 32px 20px 60px; }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 5vw, 38px);
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .page-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 32px; font-weight: 400; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 18px;
  }

  /* Input row */
  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field input, .field select {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
  }
  .field input.error { border-color: var(--error); }
  .field input.valid { border-color: var(--valid); }

  .field-ip { flex: 2; min-width: 180px; }
  .field-cidr { flex: 1; min-width: 200px; }

  .btn-calc {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 10px 26px;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.12s;
    white-space: nowrap;
    letter-spacing: 0.3px;
    height: 42px;
    align-self: flex-end;
  }
  .btn-calc:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-calc:active { transform: translateY(0); }

  .error-msg {
    font-size: 12px;
    color: var(--error);
    margin-top: 6px;
    display: none;
  }

  /* Results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .result-item {
    background: var(--mono-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
  }
  .result-value.highlight { color: var(--accent); }

  /* Hosts count badge */
  .hosts-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--valid-bg);
    color: var(--valid);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }

  /* Bit map */
  .bitmap-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 6px;
  }
  .bit {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    transition: background 0.1s;
  }
  .bit.net { background: var(--accent); color: #fff; }
  .bit.host { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
  .bit-sep { width: 6px; }

  /* Class tag */
  .class-tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 5px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
    margin-left: 8px;
  }

  /* Export */
  .export-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-export {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 18px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-export:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent2); }
  .btn-export svg { flex-shrink: 0; }

  /* Placeholder */
  .placeholder {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .placeholder-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .placeholder-text { font-size: 14px; }

  /* Separator */
  .sep { border: none; border-top: 1.5px solid var(--border); margin: 20px 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* CIDR table */
  .cidr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cidr-table th {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1.5px solid var(--border);
  }
  .cidr-table td {
    font-family: 'DM Mono', monospace;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
  }
  .cidr-table tr:last-child td { border-bottom: none; }
  .cidr-table tr:hover td { background: var(--surface2); }
  .cidr-table td:first-child { color: var(--accent); font-weight: 500; }

  /* Collapsible */
  .collapsible-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 0;
  }
  .collapsible-btn .arrow {
    transition: transform 0.25s;
    font-size: 12px;
  }
  .collapsible-btn.open .arrow { transform: rotate(180deg); }
  .collapsible-content { display: none; margin-top: 16px; overflow-x: auto; }
  .collapsible-content.open { display: block; }

  @media (max-width: 540px) {
    .header { padding: 0 14px; }
    .main { padding: 20px 14px 48px; }
    .card { padding: 18px; }
    .input-row { flex-direction: column; }
    .field-ip, .field-cidr { width: 100%; }
    .btn-calc { width: 100%; }
    .results-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <span>Purple Utilities</span>
    <span style="font-weight:400;color:var(--text2);font-size:14px;margin-left:4px;">/ Subnet</span>
  </div>
  <div class="header-controls">
    <button class="btn-icon" id="langBtn" onclick="toggleLang()">
      <span id="langLabel">EN</span>
    </button>
    <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
</div>

<div class="main">
  <h1 class="page-title" id="pageTitle">Subnet Calculator</h1>
  <p class="page-subtitle" id="pageSubtitle">Solo IPv4 — CIDR, maschera, host e broadcast in un colpo solo</p>

  <!-- Input -->
  <div class="card">
    <div class="card-title" id="inputCardTitle">Inserisci rete</div>
    <div class="input-row">
      <div class="field field-ip">
        <label id="labelIP">Indirizzo IP</label>
        <input type="text" id="ipInput" placeholder="192.168.1.0" autocomplete="off" spellcheck="false"
               oninput="onInputChange()" onkeydown="if(event.key==='Enter')calculate()">
      </div>
      <div class="field field-cidr">
        <label id="labelCIDR">Prefisso CIDR</label>
        <select id="cidrSelect" onchange="onInputChange()">
          <option value="">/...</option>
        </select>
      </div>
      <button class="btn-calc" id="calcBtn" onclick="calculate()">Calcola</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn-icon" style="font-size:12px" onclick="fillExample('192.168.1.42',24)" id="ex1Btn">Esempio A</button>
      <button class="btn-icon" style="font-size:12px" onclick="fillExample('10.0.5.1',8)" id="ex2Btn">Esempio B</button>
      <button class="btn-icon" style="font-size:12px" onclick="fillExample('172.16.200.15',20)" id="ex3Btn">Esempio C</button>
    </div>
  </div>

  <!-- Results -->
  <div class="card" id="resultsCard">
    <div class="card-title" id="resultsCardTitle">Risultati</div>
    <div id="resultsBody">
      <div class="placeholder">
        <div class="placeholder-icon">🔍</div>
        <div class="placeholder-text" id="placeholderText">Inserisci un indirizzo IP e un prefisso CIDR per iniziare</div>
      </div>
    </div>
  </div>

  <!-- Export -->
  <div class="card" id="exportCard" style="display:none">
    <div class="card-title" id="exportCardTitle">Esporta</div>
    <div class="export-row">
      <button class="btn-export" onclick="exportTxt()" id="btnTxt">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
        <span id="btnTxtLabel">Salva come .txt</span>
      </button>
      <button class="btn-export" onclick="exportNotes()" id="btnNotes">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
        <span id="btnNotesLabel">Apri in Note (iOS)</span>
      </button>
      <button class="btn-export" onclick="copyToClipboard()" id="btnCopy">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="btnCopyLabel">Copia</span>
      </button>
    </div>
  </div>

  <!-- CIDR Reference -->
  <div class="card">
    <button class="collapsible-btn" id="refBtn" onclick="toggleRef()">
      <span id="refTitle">Riferimento rapido CIDR</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-content" id="refContent">
      <table class="cidr-table" id="cidrTable"></table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ——— i18n ———
const T = {
  it: {
    pageTitle: "Subnet Calculator",
    pageSubtitle: "Solo IPv4 — CIDR, maschera, host e broadcast in un colpo solo",
    inputCardTitle: "Inserisci rete",
    labelIP: "Indirizzo IP",
    labelCIDR: "Prefisso CIDR",
    calcBtn: "Calcola",
    resultsCardTitle: "Risultati",
    exportCardTitle: "Esporta",
    placeholderText: "Inserisci un indirizzo IP e un prefisso CIDR per iniziare",
    btnTxtLabel: "Salva come .txt",
    btnNotesLabel: "Apri in Note (iOS)",
    btnCopyLabel: "Copia",
    refTitle: "Riferimento rapido CIDR",
    errIP: "Indirizzo IP non valido",
    errCIDR: "Seleziona un prefisso CIDR",
    toastCopied: "Copiato negli appunti!",
    toastNotes: "Apertura Note...",
    // result labels
    netAddr: "Indirizzo di rete",
    broadcast: "Broadcast",
    mask: "Maschera",
    wildcard: "Wildcard",
    firstHost: "Primo host",
    lastHost: "Ultimo host",
    hosts: "Host utilizzabili",
    ipClass: "Classe IP",
    ipType: "Tipo",
    bitmapLabel: "Mappa bit della maschera",
    netBits: "bit di rete",
    hostBits: "bit di host",
    cidrRefCols: ["CIDR","Maschera","Host utili","Classe tipica"],
    types: { loopback:"Loopback", private:"Privato", multicast:"Multicast", public:"Pubblico", apipa:"APIPA / Link-local" },
  },
  en: {
    pageTitle: "Subnet Calculator",
    pageSubtitle: "IPv4 only — CIDR, mask, hosts and broadcast at a glance",
    inputCardTitle: "Enter network",
    labelIP: "IP Address",
    labelCIDR: "CIDR Prefix",
    calcBtn: "Calculate",
    resultsCardTitle: "Results",
    exportCardTitle: "Export",
    placeholderText: "Enter an IP address and CIDR prefix to get started",
    btnTxtLabel: "Save as .txt",
    btnNotesLabel: "Open in Notes (iOS)",
    btnCopyLabel: "Copy",
    refTitle: "Quick CIDR Reference",
    errIP: "Invalid IP address",
    errCIDR: "Please select a CIDR prefix",
    toastCopied: "Copied to clipboard!",
    toastNotes: "Opening Notes...",
    netAddr: "Network address",
    broadcast: "Broadcast",
    mask: "Subnet mask",
    wildcard: "Wildcard mask",
    firstHost: "First host",
    lastHost: "Last host",
    hosts: "Usable hosts",
    ipClass: "IP Class",
    ipType: "Type",
    bitmapLabel: "Subnet mask bit map",
    netBits: "network bits",
    hostBits: "host bits",
    cidrRefCols: ["CIDR","Mask","Usable Hosts","Typical class"],
    types: { loopback:"Loopback", private:"Private", multicast:"Multicast", public:"Public", apipa:"APIPA / Link-local" },
  }
};

let lang = 'it';
let theme = 'light';
let lastResult = null;

// ——— Init ———
function init() {
  // Populate CIDR select
  const sel = document.getElementById('cidrSelect');
  sel.innerHTML = `<option value="">/... — ···.···.···.···</option>`;
  for (let i = 0; i <= 32; i++) {
    const mask = i === 0 ? 0 : (0xFFFFFFFF << (32 - i)) >>> 0;
    const maskStr = [(mask>>>24)&255,(mask>>>16)&255,(mask>>>8)&255,mask&255].join('.');
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `/${i} — ${maskStr}`;
    sel.appendChild(o);
  }
  buildCIDRTable();
  applyLang();
  // Detect system theme
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    theme = 'dark';
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeIcon').textContent = '☀️';
  }
}

// ——— Theme ———
function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ——— Lang ———
function toggleLang() {
  lang = lang === 'it' ? 'en' : 'it';
  document.documentElement.setAttribute('data-lang', lang);
  document.getElementById('langLabel').textContent = lang === 'it' ? 'EN' : 'IT';
  applyLang();
  if (lastResult) renderResults(lastResult);
  buildCIDRTable();
}

function t(k) { return T[lang][k] || k; }

function applyLang() {
  const ids = ['pageTitle','pageSubtitle','inputCardTitle','labelIP','labelCIDR',
    'calcBtn','resultsCardTitle','exportCardTitle','placeholderText',
    'btnTxtLabel','btnNotesLabel','btnCopyLabel','refTitle'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(id.replace('Btn','Btn').replace(/Label$/,'Label'));
  });
  // manual map
  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('pageSubtitle').textContent = t('pageSubtitle');
  document.getElementById('inputCardTitle').textContent = t('inputCardTitle');
  document.getElementById('labelIP').textContent = t('labelIP');
  document.getElementById('labelCIDR').textContent = t('labelCIDR');
  document.getElementById('calcBtn').textContent = t('calcBtn');
  document.getElementById('resultsCardTitle').textContent = t('resultsCardTitle');
  document.getElementById('exportCardTitle').textContent = t('exportCardTitle');
  document.getElementById('placeholderText').textContent = t('placeholderText');
  document.getElementById('btnTxtLabel').textContent = t('btnTxtLabel');
  document.getElementById('btnNotesLabel').textContent = t('btnNotesLabel');
  document.getElementById('btnCopyLabel').textContent = t('btnCopyLabel');
  document.getElementById('refTitle').textContent = t('refTitle');
}

// ——— IP utils ———
function parseIP(str) {
  const parts = str.trim().split('.');
  if (parts.length !== 4) return null;
  const nums = parts.map(Number);
  if (nums.some(n => isNaN(n) || n < 0 || n > 255 || String(n) !== parts[nums.indexOf(n)])) return null;
  // re-check string match
  for (let i = 0; i < 4; i++) {
    if (String(nums[i]) !== parts[i].trim()) return null;
  }
  return nums;
}

function ipToInt(parts) {
  return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
}

function intToIP(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}

function cidrToMask(cidr) {
  return cidr === 0 ? 0 : (0xFFFFFFFF << (32 - cidr)) >>> 0;
}

function getClass(ip) {
  const f = ip[0];
  if (f < 128) return 'A';
  if (f < 192) return 'B';
  if (f < 224) return 'C';
  if (f < 240) return 'D';
  return 'E';
}

function getType(ip) {
  const f = ip[0], s = ip[1];
  if (f === 127) return 'loopback';
  if (f === 169 && s === 254) return 'apipa';
  if (f === 10) return 'private';
  if (f === 172 && s >= 16 && s <= 31) return 'private';
  if (f === 192 && s === 168) return 'private';
  if (f >= 224 && f < 240) return 'multicast';
  return 'public';
}

// ——— Calculate ———
function onInputChange() {
  document.getElementById('ipInput').classList.remove('error','valid');
  document.getElementById('errorMsg').style.display = 'none';
}

function fillExample(ip, cidr) {
  document.getElementById('ipInput').value = ip;
  document.getElementById('cidrSelect').value = cidr;
  calculate();
}

function calculate() {
  const ipStr = document.getElementById('ipInput').value.trim();
  const cidrVal = document.getElementById('cidrSelect').value;
  const errEl = document.getElementById('errorMsg');
  const ipEl = document.getElementById('ipInput');

  ipEl.classList.remove('error','valid');
  errEl.style.display = 'none';

  const ip = parseIP(ipStr);
  if (!ip) {
    ipEl.classList.add('error');
    errEl.textContent = t('errIP');
    errEl.style.display = 'block';
    return;
  }
  if (cidrVal === '') {
    errEl.textContent = t('errCIDR');
    errEl.style.display = 'block';
    return;
  }

  ipEl.classList.add('valid');

  const cidr = parseInt(cidrVal);
  const mask = cidrToMask(cidr);
  const ipInt = ipToInt(ip);
  const netInt = (ipInt & mask) >>> 0;
  const broadcastInt = (netInt | (~mask >>> 0)) >>> 0;
  const hostBits = 32 - cidr;
  const totalHosts = cidr === 32 ? 1 : cidr === 31 ? 2 : Math.pow(2, hostBits);
  const usableHosts = cidr >= 31 ? totalHosts : totalHosts - 2;
  const firstHost = cidr >= 31 ? netInt : netInt + 1;
  const lastHost  = cidr >= 31 ? broadcastInt : broadcastInt - 1;

  const result = {
    ip, cidr, mask, ipInt, netInt, broadcastInt,
    netAddr: intToIP(netInt),
    broadcast: intToIP(broadcastInt),
    maskStr: intToIP(mask),
    wildcard: intToIP(~mask >>> 0),
    firstHost: intToIP(firstHost),
    lastHost: intToIP(lastHost),
    usableHosts, totalHosts,
    ipClass: getClass(ip),
    ipType: getType(ip),
    hostBits
  };

  lastResult = result;
  renderResults(result);
  document.getElementById('exportCard').style.display = 'block';
}

function renderResults(r) {
  const body = document.getElementById('resultsBody');

  const typeStr = t('types')[r.ipType] || r.ipType;

  // Bitmap
  let bitmapHTML = '<div class="bitmap-row">';
  for (let i = 0; i < 32; i++) {
    if (i > 0 && i % 8 === 0) bitmapHTML += '<div class="bit-sep"></div>';
    const cls = i < r.cidr ? 'net' : 'host';
    bitmapHTML += `<div class="bit ${cls}" title="bit ${i+1}">${i < r.cidr ? '1' : '0'}</div>`;
  }
  bitmapHTML += '</div>';
  bitmapHTML += `<div style="margin-top:8px;font-size:11px;color:var(--text2);">
    <span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;">
      <span class="bit net" style="width:14px;height:14px;border-radius:2px;display:inline-block"></span>
      ${r.cidr} ${t('netBits')}
    </span>
    <span style="display:inline-flex;align-items:center;gap:4px;">
      <span class="bit host" style="width:14px;height:14px;border-radius:2px;display:inline-block"></span>
      ${r.hostBits} ${t('hostBits')}
    </span>
  </div>`;

  body.innerHTML = `
    <div class="results-grid">
      <div class="result-item" style="grid-column: span 2;">
        <div class="result-label">${t('netAddr')} / ${t('mask')}</div>
        <div class="result-value highlight">${r.netAddr}<strong style="color:var(--text2);font-weight:400">/${r.cidr}</strong></div>
        <div class="result-value" style="font-size:13px;color:var(--text2)">${r.maskStr}</div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('broadcast')}</div>
        <div class="result-value">${r.broadcast}</div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('wildcard')}</div>
        <div class="result-value">${r.wildcard}</div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('firstHost')}</div>
        <div class="result-value">${r.firstHost}</div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('lastHost')}</div>
        <div class="result-value">${r.lastHost}</div>
      </div>
      <div class="result-item" style="grid-column: span 2;">
        <div class="result-label">${t('hosts')}</div>
        <div class="result-value">
          <span class="hosts-badge">✓ ${r.usableHosts.toLocaleString()}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:8px;">(${r.totalHosts.toLocaleString()} ${lang==='it'?'totali':'total'})</span>
        </div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('ipClass')}</div>
        <div class="result-value">
          ${lang==='it'?'Classe':'Class'}
          <span class="class-tag">${r.ipClass}</span>
        </div>
      </div>
      <div class="result-item">
        <div class="result-label">${t('ipType')}</div>
        <div class="result-value" style="font-size:13px;">${typeStr}</div>
      </div>
    </div>
    <hr class="sep">
    <div class="card-title" style="margin-bottom:12px">${t('bitmapLabel')}</div>
    ${bitmapHTML}
  `;
}

// ——— CIDR Reference Table ———
const CIDR_REF = [
  [8,'255.0.0.0',16777214,'A'],
  [16,'255.255.0.0',65534,'B'],
  [24,'255.255.255.0',254,'C'],
  [25,'255.255.255.128',126,'C'],
  [26,'255.255.255.192',62,'C'],
  [27,'255.255.255.224',30,'C'],
  [28,'255.255.255.240',14,'C'],
  [29,'255.255.255.248',6,'C'],
  [30,'255.255.255.252',2,'P2P'],
  [31,'255.255.255.254',2,'P2P'],
  [32,'255.255.255.255',1,'Host'],
  [12,'255.240.0.0',1048574,'B'],
  [20,'255.255.240.0',4094,'C'],
  [22,'255.255.252.0',1022,'C'],
  [23,'255.255.254.0',510,'C'],
];
CIDR_REF.sort((a,b)=>a[0]-b[0]);

function buildCIDRTable() {
  const cols = t('cidrRefCols');
  let html = `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  CIDR_REF.forEach(([cidr,mask,hosts,cls])=>{
    html += `<tr>
      <td>/${cidr}</td>
      <td>${mask}</td>
      <td>${hosts.toLocaleString()}</td>
      <td>${cls}</td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('cidrTable').innerHTML = html;
}

function toggleRef() {
  const btn = document.getElementById('refBtn');
  const content = document.getElementById('refContent');
  btn.classList.toggle('open');
  content.classList.toggle('open');
}

// ——— Export ———
function buildText() {
  if (!lastResult) return '';
  const r = lastResult;
  const sep = '─'.repeat(38);
  const lines = [
    `Purple Utilities — Subnet Calculator`,
    sep,
    `${lang==='it'?'Rete':'Network'}:         ${r.netAddr}/${r.cidr}`,
    `${t('mask')}:     ${r.maskStr}`,
    `${t('broadcast')}:    ${r.broadcast}`,
    `${t('wildcard')}:     ${r.wildcard}`,
    sep,
    `${t('firstHost')}:  ${r.firstHost}`,
    `${t('lastHost')}:   ${r.lastHost}`,
    `${t('hosts')}:  ${r.usableHosts.toLocaleString()}`,
    sep,
    `${t('ipClass')}:   ${lang==='it'?'Classe':'Class'} ${r.ipClass}`,
    `${t('ipType')}:         ${t('types')[r.ipType]||r.ipType}`,
    sep,
    `Generated by Purple Utilities — github.com/centobuste`,
    new Date().toLocaleString(lang==='it'?'it-IT':'en-US'),
  ];
  return lines.join('\n');
}

function exportTxt() {
  const text = buildText();
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `subnet_${lastResult.netAddr.replace(/\./g,'_')}_${lastResult.cidr}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportNotes() {
  const text = buildText();
  const encoded = encodeURIComponent(text);
  // iOS Notes URL scheme
  const url = `mobilenotes://compose?body=${encoded}`;
  showToast(t('toastNotes'));
  // Try iOS scheme first, fallback to web
  window.location.href = url;
}

function copyToClipboard() {
  const text = buildText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast(t('toastCopied')));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(t('toastCopied'));
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

init();
